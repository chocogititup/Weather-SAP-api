name: SAP BTP CAP Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CF_API: ${{ secrets.CF_API }}
      CF_ORG: ${{ secrets.CF_ORG }}
      CF_SPACE: ${{ secrets.CF_SPACE }}
      CF_USERNAME: ${{ secrets.CF_USERNAME }}
      CF_PASSWORD: ${{ secrets.CF_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install CAP CLI
        run: npm install -g @sap/cds-dk

      - name: Build CAP Project
        run: |
          npx cds build --production

      - name: Install MBT
        run: npm install -g mbt

      - name: Build MTAR
        run: |
          mbt build -t mta_archives

      - name: Install Cloud Foundry CLI
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install cf8-cli -y

      - name: Login to Cloud Foundry
        run: |
          cf api $CF_API
          cf auth $CF_USERNAME $CF_PASSWORD
          cf target -o $CF_ORG -s $CF_SPACE

      - name: Install MultiApps Plugin
        run: |
          wget -O multiapps-plugin-linux \
          https://github.com/cloudfoundry/multiapps-cli-plugin/releases/latest/download/linux-amd64
          chmod +x multiapps-plugin-linux
          cf install-plugin ./multiapps-plugin-linux -f

      - name: Deploy MTAR
        run: |
          cf deploy mta_archives/*.mtar -f
